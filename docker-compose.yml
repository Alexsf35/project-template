version: '3.3'

services:

  build:
    image: biocypher/base:1.2.0
    #container_name: build
    volumes:
      - biocypher_neo4j_volume:/usr/app/data
      - .:/src/
    command:
      - /bin/bash
      - /src/scripts/build.sh

  import:
    image: neo4j:4.4-enterprise
    #container_name: import
    environment:
      NEO4J_AUTH: none
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      FILL_DB_ON_STARTUP: "yes"
    volumes:
      - biocypher_neo4j_volume:/data
      - ./scripts/import.sh:/scripts/import.sh
      - ./${IMPORT_DIR}:/data/build2neo
    command:
      - /bin/bash
      - /scripts/import.sh

  deploy:
    image: neo4j:4.4-enterprise
    #container_name: deploy
    volumes:
      - biocypher_neo4j_volume:/data
    environment:
      NEO4J_dbms_security_auth__enabled: "false"
      NEO4J_dbms_databases_default__to__read__only: "false"
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    depends_on:
      import:
        condition: service_completed_successfully

  enrich:
    image: biocypher/biochatter-light:latest
    #container_name: enrich_pubmed
    volumes:
      - .:/src/
    environment:
      NEO4J_URI: bolt://deploy:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ""
    entrypoint: ["python3", "/src/enrich_graph_pubmed2.py"]
    depends_on:
      - deploy

  enrich_string:
    image: python:3.10-slim
    #container_name: enrich_string
    volumes:
      - .:/src/
    environment:
      NEO4J_URI: bolt://deploy:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ""
    entrypoint: >
      sh -c "pip install --no-cache-dir pandas neo4j && 
             python3 /src/enrich_graph_string.py"
    depends_on:
      - deploy
      - enrich

volumes:
  biocypher_neo4j_volume:
